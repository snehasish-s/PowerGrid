# ============================================================
# PowerPulse AI — Application Configuration
# TPCODL Smart Utility Asset Intelligence Platform
# ============================================================

# ---- Application Info ----
spring.application.name=PowerPulse AI
server.port=8080

# ---- MySQL Database Configuration ----
spring.datasource.url=jdbc:mysql://localhost:3306/powerpulse_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQL_USER:powerpulse_admin}
spring.datasource.password=${MYSQL_PASSWORD:TpCoDL@2026!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ---- Connection Pool (HikariCP) ----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# ---- JWT Configuration ----
# Base64-encoded HMAC-SHA256 secret key
app.jwt.secret=UG93ZXJQdWxzZUFJX1RQQ09ETF8yMDI2X1N1cGVyU2VjcmV0S2V5X1NtYXJ0VXRpbGl0eUFzc2V0SW50ZWxsaWdlbmNlX3g5azJtNA==
# Token validity: 24 hours (in milliseconds)
app.jwt.expiration-ms=86400000

# ---- FastAPI ML Service URL ----
app.ml-service.url=${ML_SERVICE_URL:http://localhost:8000}

# ---- Server Configuration ----
server.error.include-message=always
server.error.include-binding-errors=always

# ---- Logging ----
logging.level.root=INFO
logging.level.com.tpcodl.powerpulse=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ---- File Upload (for inspection images, if needed) ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- Jackson JSON ----
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata
